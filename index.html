<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSRLS |  Application link Detail</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f4f7f6; }
        .gov-header { background: linear-gradient(90deg, #002e5b 0%, #004a92 100%); color: white; }
        .table-fixed-header thead th {
            position: sticky; top: 0; background-color: #f8fafc; z-index: 10;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em;
        }
        .btn-gov { background-color: #004a92; color: white; border: none; }
        .btn-gov:hover { background-color: #00356b; color: white; }
        .card-header-main { border-top: 4px solid #f59e0b; }
    </style>
</head>

<body>

<nav class="gov-header shadow-md p-3 mb-6">
    <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-white p-1 rounded">
                <img src="logo.png" class="h-10">
            </div>
            <div>
                <h1 class="text-xl font-bold">MSRLS</h1>
                <p class="text-xs opacity-80 uppercase">Govt. of Meghalaya</p>
            </div>
        </div>
        <span class="hidden md:block text-sm">MSRLS Application</span>
    </div>
</nav>

<main class="container mx-auto px-4 pb-12">
    <div class="bg-white rounded-lg shadow-lg border card-header-main">

        <div class="p-6 border-b bg-gray-50">
            <h2 class="text-2xl font-semibold">MSRLS APPLICATION</h2>
        </div>

        <div class="p-6">

            <!-- FILTERS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

                <div>
                    <label class="text-xs font-bold text-gray-600 uppercase">Search Records</label>
                    <input type="text" id="searchInput" class="form-control form-control-sm"
                        placeholder="Search by name, ID...">
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-600 uppercase">Show</label>
                    <select id="showEntries" class="form-select form-select-sm w-24">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>

                <div class="flex items-end">
                    <button id="resetBtn" class="btn btn-sm btn-outline-secondary px-4">Reset</button>
                </div>

            </div>

            <!-- TABLE -->
            <div class="table-responsive rounded border">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>SL</th>
                            <th>Application Name</th>
                            <th>Remarks</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="meetingTableBody">
                        <tr><td colspan="4" class="text-center py-10">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- PAGINATION -->
            <div class="flex justify-between items-center mt-6 py-4 border-t">
                <div>
                    Total: <span id="totalEntries">0</span>
                </div>
                <div class="flex items-center gap-3">
                    <button id="prevBtn" class="btn btn-sm btn-outline-primary">Prev</button>
                    <span id="pageInfo">Page 1</span>
                    <button id="nextBtn" class="btn btn-sm btn-outline-primary">Next</button>
                </div>
            </div>

        </div>
    </div>
</main>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxW34yzKrn6mKZsvwvt_aEohspO_q3GohdBO6JB7nXD8udVH3TZNhFjtJlGKMvezMLT/exec";

let allMeetingData = [];
let filteredData = [];
let currentPage = 1;
let itemsPerPage = 10;

const body = document.getElementById('meetingTableBody');
const searchInput = document.getElementById('searchInput');
const showEntries = document.getElementById('showEntries');
const resetBtn = document.getElementById('resetBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageInfo = document.getElementById('pageInfo');
const totalEntriesSpan = document.getElementById('totalEntries');

async function fetchData() {
    try {
        const res = await fetch(WEB_APP_URL);
        const raw = await res.json();

        const headers = raw.message[0];

        allMeetingData = raw.message.slice(1).map(r => {
            let obj = {};
            headers.forEach((h, i) => obj[h] = r[i]);
            return obj;
        });

        applyFilters();
    } catch (e) {
        body.innerHTML = `<tr><td colspan="4" class="text-danger text-center">Error loading</td></tr>`;
    }
}

function applyFilters() {
    const term = searchInput.value.toLowerCase();

    filteredData = allMeetingData.filter(item =>
        Object.values(item).some(v =>
            String(v).toLowerCase().includes(term)
        )
    );

    currentPage = 1;
    renderTable();
}

function renderTable() {
    body.innerHTML = "";

    const start = (currentPage - 1) * itemsPerPage;
    const data = filteredData.slice(start, start + itemsPerPage);

    if (!data.length) {
        body.innerHTML = `<tr><td colspan="4" class="text-center">No Data</td></tr>`;
        return;
    }

    data.forEach((item, i) => {
        const link = item.link && item.link !== "N/A"
            ? `<a href="${item.link}" target="_blank" class="btn btn-sm btn-outline-primary">Open</a>`
            : `<span class="badge bg-light border">No Link</span>`;

        body.innerHTML += `
            <tr>
                <td>${start + i + 1}</td>
                <td>${item.Name || 'N/A'}</td>
                <td>${item.Remarks || '-'}</td>
                <td class="text-center">${link}</td>
            </tr>
        `;
    });

    updatePagination();
}

function updatePagination() {
    const totalPages = Math.ceil(filteredData.length / itemsPerPage);

    pageInfo.textContent = `Page ${currentPage} of ${totalPages || 1}`;
    totalEntriesSpan.textContent = filteredData.length;

    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage >= totalPages;
}

// EVENTS
searchInput.addEventListener('input', applyFilters);

showEntries.addEventListener('change', e => {
    itemsPerPage = parseInt(e.target.value);
    applyFilters();
});

resetBtn.addEventListener('click', () => {
    searchInput.value = '';
    applyFilters();
});

prevBtn.addEventListener('click', () => {
    currentPage--;
    renderTable();
});

nextBtn.addEventListener('click', () => {
    currentPage++;
    renderTable();
});

document.addEventListener('DOMContentLoaded', fetchData);
</script>

</body>
</html>
